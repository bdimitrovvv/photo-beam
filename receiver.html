<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PhotoBeam — receiver</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-a: #0a0a1a;
  --bg-b: #1a0a2e;
  --photo-w: 320px;
  --photo-h: 430px;
  --radius: 28px;
}

@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@200;300;400&display=swap');

body {
  min-height: 100vh;
  background: linear-gradient(135deg, var(--bg-a) 0%, var(--bg-b) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  transition: background 1.6s ease;
}

/* ── Status ── */
#status {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.35);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  pointer-events: none;
  z-index: 100;
  transition: opacity 0.4s;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  transition: background 0.4s;
}

.status-dot.connected { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
.status-dot.receiving { background: #00aaff; box-shadow: 0 0 10px #00aaff; animation: dot-blink 0.4s ease infinite alternate; }

@keyframes dot-blink { to { opacity: 0.3; } }

/* ── Waiting ── */
#waiting {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  opacity: 1;
  transition: opacity 0.6s ease;
}

#waiting.hidden { opacity: 0; pointer-events: none; }

.glasses-icon {
  width: 64px;
  height: 24px;
  position: relative;
}

.glasses-icon::before,
.glasses-icon::after {
  content: '';
  position: absolute;
  top: 0;
  width: 26px;
  height: 24px;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 8px;
}

.glasses-icon::before { left: 0; }
.glasses-icon::after  { right: 0; }

.glasses-bridge {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 12px;
  height: 2px;
  background: rgba(255,255,255,0.2);
  border-radius: 1px;
}

.waiting-text {
  font-size: 14px;
  font-weight: 300;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.scan-line {
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation: scan 2.5s ease-in-out infinite;
}

@keyframes scan {
  0%   { transform: translateX(-100px); opacity: 0; }
  20%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateX(100px); opacity: 0; }
}

/* ── Photo card ── */
#photo-wrap {
  position: absolute;
  width: var(--photo-w);
  height: var(--photo-h);
  border-radius: var(--radius);
  overflow: hidden;
  opacity: 0;
  transform: translateX(-120vw) scale(0.7) rotate(-4deg);
  pointer-events: none;
  will-change: transform, opacity;
  box-shadow:
    0 40px 100px rgba(0,0,0,0.5),
    0 0 0 1px rgba(255,255,255,0.08),
    inset 0 0 0 1px rgba(255,255,255,0.05);
}

#photo-wrap.arriving {
  animation: photoArrive 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

#photo-wrap.arrived {
  opacity: 1;
  transform: translateX(0) scale(1) rotate(0deg);
  pointer-events: auto;
}

@keyframes photoArrive {
  0%   { opacity: 0; transform: translateX(-120vw) scale(0.7) rotate(-4deg); }
  30%  { opacity: 1; }
  70%  { transform: translateX(8px) scale(1.02) rotate(0.5deg); }
  85%  { transform: translateX(-4px) scale(0.99) rotate(-0.2deg); }
  100% { opacity: 1; transform: translateX(0) scale(1) rotate(0deg); }
}

#photo-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ── Timestamp badge ── */
#timestamp {
  position: absolute;
  bottom: 16px;
  left: 16px;
  right: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.4s ease 0.8s;
}

#timestamp.visible {
  opacity: 1;
  transform: translateY(0);
}

.ts-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.08em;
}

.ts-from {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  display: flex;
  align-items: center;
  gap: 5px;
}

.glasses-badge {
  width: 14px;
  height: 6px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 2px;
  position: relative;
}

.glasses-badge::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 4px;
  height: 1px;
  background: rgba(255,255,255,0.3);
}

/* ── Particles ── */
.particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
}

/* ── Background glow ── */
.bg-glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease;
  mix-blend-mode: screen;
}

.bg-glow.active { opacity: 0.15; }
</style>
</head>
<body>

<div class="bg-glow" id="bgGlow"></div>

<div id="status">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Connecting…</span>
</div>

<div id="waiting">
  <div class="glasses-icon"><div class="glasses-bridge"></div></div>
  <div class="waiting-text">Waiting for beam</div>
  <div class="scan-line"></div>
</div>

<div id="photo-wrap">
  <img id="photo-img" src="" alt="Beamed photo">
  <div id="timestamp">
    <span class="ts-label" id="ts-time">—</span>
    <div class="ts-from">
      <div class="glasses-badge"></div>
      <span>from glasses</span>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
// Update this to your deployed relay URL
// For local: ws://YOUR_MAC_IP:3000/ws
// For production: wss://your-relay.railway.app/ws
const WS_URL = window.location.protocol === 'https:'
  ? 'wss://' + window.location.host + '/ws'
  : 'ws://'  + window.location.host + '/ws';

// ── Elements ──────────────────────────────────────────────────────────────
const statusDot  = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const waitingEl  = document.getElementById('waiting');
const photoWrap  = document.getElementById('photo-wrap');
const photoImg   = document.getElementById('photo-img');
const tsTime     = document.getElementById('ts-time');
const tsEl       = document.getElementById('timestamp');
const bgGlow     = document.getElementById('bgGlow');

// ── WebSocket ─────────────────────────────────────────────────────────────
let ws;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    statusDot.className  = 'status-dot connected';
    statusText.textContent = 'Ready to receive';
  };

  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'beam') receivePhoto(msg);
    } catch(_) {}
  };

  ws.onclose = () => {
    statusDot.className  = 'status-dot';
    statusText.textContent = 'Reconnecting…';
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();
}

connect();

// ── Receive photo ─────────────────────────────────────────────────────────
function receivePhoto({ imageURL, dominantColor }) {
  statusDot.className = 'status-dot receiving';

  const hex     = dominantColor || '#2a6b8a';
  const shifted = shiftHue(hex, 45);

  // Shift background colour
  document.body.style.setProperty('--bg-a', hex);
  document.body.style.setProperty('--bg-b', shifted);
  document.body.style.background = `linear-gradient(135deg, ${hex} 0%, ${shifted} 100%)`;

  // Glow layer
  bgGlow.style.background = `radial-gradient(circle at center, ${hex} 0%, transparent 70%)`;
  bgGlow.classList.add('active');

  // Hide waiting
  waitingEl.classList.add('hidden');

  // Reset and animate photo
  photoWrap.classList.remove('arriving', 'arrived');
  tsEl.classList.remove('visible');
  void photoWrap.offsetWidth;

  photoImg.onload = () => {
    spawnParticles();
    photoWrap.classList.add('arriving');
    photoWrap.addEventListener('animationend', () => {
      photoWrap.classList.add('arrived');
      refineColor(photoImg);
      tsTime.textContent = new Date().toLocaleTimeString();
      tsEl.classList.add('visible');
      statusDot.className  = 'status-dot connected';
      statusText.textContent = 'Received · ' + tsTime.textContent;
    }, { once: true });
  };

  photoImg.src = imageURL;
}

// ── Particles ─────────────────────────────────────────────────────────────
function spawnParticles() {
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size  = 2 + Math.random() * 4;
    const x     = 5  + Math.random() * 25;
    const y     = 15 + Math.random() * 70;
    Object.assign(p.style, {
      width:  size + 'px',
      height: size + 'px',
      left:   x + 'vw',
      top:    y + 'vh',
      background: `rgba(255,255,255,${0.4 + Math.random() * 0.5})`
    });
    document.body.appendChild(p);
    const delay = Math.random() * 300;
    const dx    = 60 + Math.random() * 200;
    const dy    = (Math.random() - 0.5) * 120;
    setTimeout(() => {
      p.style.transition = 'transform 1s ease-out, opacity 1s ease-out';
      p.style.opacity    = '0.9';
      p.style.transform  = `translate(${dx}px, ${dy}px)`;
      setTimeout(() => {
        p.style.opacity = '0';
        setTimeout(() => p.remove(), 600);
      }, 400);
    }, delay);
  }
}

// ── Colour helpers ────────────────────────────────────────────────────────
function shiftHue(hex, deg) {
  let [r, g, b] = [1,3,5].map(i => parseInt(hex.slice(i,i+2),16)/255);
  const max=Math.max(r,g,b), min=Math.min(r,g,b), l=(max+min)/2;
  let h=0,s=0;
  if(max!==min){const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);
    if(max===r)h=((g-b)/d+(g<b?6:0))/6;
    else if(max===g)h=((b-r)/d+2)/6;
    else h=((r-g)/d+4)/6;}
  h=(h+deg/360+1)%1;
  const q=l<.5?l*(1+s):l+s-l*s,p2=2*l-q;
  const hue2rgb=(p,q,t)=>{const tt=(t+1)%1;if(tt<1/6)return p+(q-p)*6*tt;if(tt<.5)return q;if(tt<2/3)return p+(q-p)*(2/3-tt)*6;return p;};
  return '#'+[h+1/3,h,h-1/3].map(t=>Math.round(hue2rgb(p2,q,t)*255).toString(16).padStart(2,'0')).join('');
}

function refineColor(img) {
  try {
    const c=document.createElement('canvas');c.width=c.height=1;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0,1,1);
    const [r,g,b]=ctx.getImageData(0,0,1,1).data;
    const hex='#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
    const shifted=shiftHue(hex,45);
    document.body.style.background=`linear-gradient(135deg,${hex} 0%,${shifted} 100%)`;
    bgGlow.style.background=`radial-gradient(circle at center,${hex} 0%,transparent 70%)`;
  }catch(_){}
}
</script>
</body>
</html>
